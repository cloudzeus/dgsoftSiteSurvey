[phases.setup]
nixPkgs = ["nodejs_22", "openssl_3"]

[phases.install]
cmds = ["npm ci"]

[phases.build]
cmds = [
  "cd packages/softone-admin-dashboard && npx prisma generate",
  "npm run build -w softone-admin-dashboard",
  "cp -a packages/softone-admin-dashboard/.next/standalone/. ."
]

[variables]
NODE_ENV = "production"
NEXT_TELEMETRY_DISABLED = "1"

[start]
cmd = "HOSTNAME=0.0.0.0 node packages/softone-admin-dashboard/server.js"
